# if i get anything that's not a post request, the ip i give to the limiter is empty.'
map $request_method $limit_key {
    default "";
    POST $binary_remote_addr;
}

# take the ip's that have been "filtered" by the limit_key and only apply the limiter on those.
limit_req_zone $limit_key zone=timeline_post_limit:10m rate=4r/m;

server {
    listen 80;
    server_name 4brar.me;

    if ($host = 4brar.me) {
	return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 4brar.me;

    # Load the certificate files.
    ssl_certificate /etc/letsencrypt/live/myportfolio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myportfolio/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/myportfolio/chain.pem;

    location / {
	proxy_pass http://myportfolio:5000/;
	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/timeline_post {
	limit_req zone=timeline_post_limit burst=2 nodelay;

	proxy_pass http://myportfolio:5000/api/timeline_post;

	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name observe.4brar.me;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name observe.4brar.me;

    ssl_certificate /etc/letsencrypt/live/observe.4brar.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/observe.4brar.me/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/observe.4brar.me/chain.pem;

    location / {
	proxy_pass http://grafana:3000/;
	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_http_version 1.1;
	proxy_set_header Upgrade $http_upgrade;
	proxy_set_header Connection "upgrade";
    }
}
