{% extends "base.html" %}

{% block content %}
<section class="section">
    <p class="section__label reveal">Career</p>
    <h1 class="section__title reveal">{{ title }}</h1>
    <p class="section__subtitle reveal">Places I've worked and things I've built.</p>

    <div class="cards stagger">
        {% for item in work %}
        <div class="card reveal">
            <div class="card__header">
                <h2 class="card__title">{{ item.title }}</h2>
                <span class="card__date">{{ item.startdate }} — {{ item.enddate }}</span>
            </div>
            <p class="card__role">{{ item.role }}</p>
            <p class="card__desc">{{ item.description }}</p>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
