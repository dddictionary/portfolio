<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="Abrar Habib — Portfolio">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon">
    <title>{{ title }}</title>

    {% block head %}{% endblock %}
</head>
<body>
    <nav class="nav" id="nav">
        <a href="/" class="nav__logo">AH</a>
        <button class="nav__toggle" id="navToggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
        </button>
        <div class="nav__links" id="navLinks">
            {% for item in navigation %}
            <a href="{{ item.href }}" class="nav__link {% if request.path == item.href %}nav__link--active{% endif %}">{{ item.caption }}</a>
            {% endfor %}
        </div>
    </nav>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <span class="footer__line"></span>
        <p class="footer__text">&copy; 2026 Abrar Habib</p>
    </footer>

    <script>
        // Mobile nav toggle
        const toggle = document.getElementById('navToggle');
        const links = document.getElementById('navLinks');
        toggle.addEventListener('click', () => {
            links.classList.toggle('nav__links--open');
            toggle.classList.toggle('nav__toggle--open');
        });

        // Scroll reveal
        const reveals = document.querySelectorAll('.reveal');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        reveals.forEach(el => observer.observe(el));

        // Nav background on scroll
        const nav = document.getElementById('nav');
        window.addEventListener('scroll', () => {
            nav.classList.toggle('nav--scrolled', window.scrollY > 40);
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
